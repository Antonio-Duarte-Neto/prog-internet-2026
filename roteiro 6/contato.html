<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Contato</title>
     <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <header>
        <h1>Meu Mini-Site</h1>
    </header>
    
<div class="container">
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="sobre.html">Sobre</a></li>
            <li><a href="contato.html">Contato</a></li>
        </ul>
    </nav>
</div>

  <form class="form-contato">

    <h2>Formulário de Contato</h2>

    <label for="name">Nome:</label>
    <input type="text" id="nome" required minlength="3" placeholder="Digite seu nome">

    <label for="email">Email:</label>
    <input type="email" id="email" required placeholder="exemplo@email.com">

    <label for="telefone">Telefone:</label>
    <input type="tel" id="telefone" pattern="[0-9]{10,11}" placeholder="(00) 00000-0000">

    <label for="assunto">Assunto:</label>
    <select id="assunto">
       <option value="">Selecione</option>
       <option value="duvida">Dúvida</option>
       <option value="sugestao">Sugestão</option>
       <option value="contato">Contato</option>
    </select>
    
    <label for="mensagem">Mensagem:</label>
    <textarea id="mensagem" rows="4" required></textarea>

    <button type="submit">Enviar</button>

  </form>
</body>
</html>
